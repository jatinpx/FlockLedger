services:
  # Optional: only when you want Postgres in Docker (not needed if DATABASE_URL is Neon).
  # Start with: docker compose --profile local-db up
  postgres:
    profiles:
      - local-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flock}
      POSTGRES_DB: ${POSTGRES_DB:-flockledger}
    # Host 5433 avoids clashing with Postgres already on 5432 (WSL/Windows/local)
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flock} -d ${POSTGRES_DB:-flockledger}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port (or use "6380:6379") so this does not clash with Redis/WSL on 6379
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: backend/.env
        required: false
    environment:
      # Inside Docker, Redis is the service name `redis`, not localhost (overrides REDIS_URL in backend/.env).
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    # Cannot depend_on postgres here: postgres uses profile local-db and is "undefined"
    # when the profile is off (Neon-only stack). Entrypoint waits for postgres when needed.

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pgdata:
